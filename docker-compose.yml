version: '3.8'

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ig_dm_listener
      POSTGRES_USER: igapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-igapp_secret}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igapp -d ig_dm_listener"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
